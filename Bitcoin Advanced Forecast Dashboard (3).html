<script>
let data = [];

document.getElementById("fileInput").addEventListener("change", e=>{
const r=new FileReader();
r.onload=x=>{data=JSON.parse(x.target.result);prep();build();}
r.readAsText(e.target.files[0]);
});

function prep(){
data.forEach(d=>{
d.date=new Date(d.Date);
d.close=parseFloat(d.Price.replace(/,/g,""));
d.open=parseFloat(d.Open.replace(/,/g,""));
d.high=parseFloat(d.High.replace(/,/g,""));
d.low=parseFloat(d.Low.replace(/,/g,""));
d.volume=parseFloat(d["Vol."].replace("K",""))*1000;
d.return=parseFloat(d["Change %"])/100;
});
}

function build(){
overview();price();forecast();sentiment();risk();indicators();corr();explain();backtest();controls();
}

function overview(){
const l=data[0];
page0.innerHTML=`
<div class="kpi">Price<br><b>$${l.close.toFixed(2)}</b></div>
<div class="kpi">Daily Return<br><b>${(l.return*100).toFixed(2)}%</b></div>
<div class="kpi">High<br><b>$${l.high.toFixed(2)}</b></div>
<div class="kpi">Low<br><b>$${l.low.toFixed(2)}</b></div>`;
}

function price(){
Plotly.newPlot("page1",[{
x:data.map(d=>d.date),
open:data.map(d=>d.open),
high:data.map(d=>d.high),
low:data.map(d=>d.low),
close:data.map(d=>d.close),
type:"candlestick"}],
{title:"Bitcoin Price Explorer"});
}

async function forecast(){
const prices=data.map(d=>d.close);
const dates=data.map(d=>d.date);
const horizon=30;

let ar=[];let last=prices[0];
for(let i=0;i<horizon;i++){last*=1+avgRet();ar.push(last);}

const trend=linReg(prices);
let prophet=[];
for(let i=1;i<=horizon;i++){
prophet.push(trend.slope*(prices.length+i)+trend.intercept+
Math.sin(2*Math.PI*i/7)*std(prices)*0.2);
}

const lstm=await lstmModel(prices,horizon);
const sigma=std(prices);
const upper=lstm.map(v=>v+1.96*sigma);
const lower=lstm.map(v=>v-1.96*sigma);

Plotly.newPlot("page2",[
{x:dates,y:prices,mode:"lines",name:"Historical"},
{x:future(dates[0],horizon),y:ar,mode:"lines",name:"AR-like"},
{x:future(dates[0],horizon),y:prophet,mode:"lines",name:"Prophet-style"},
{x:future(dates[0],horizon),y:lstm,mode:"lines",name:"LSTM",line:{width:4}},
{x:future(dates[0],horizon),y:upper,fill:null,name:"Upper CI"},
{x:future(dates[0],horizon),y:lower,fill:"tonexty",name:"Lower CI"}],
{title:"Forecast & Uncertainty"});
}

function sentiment(){
Plotly.newPlot("page3",[{
x:data.map(d=>d.date),
y:data.map(d=>Math.sign(d.return)),
type:"bar"}],{title:"Sentiment Proxy"});
}

function risk(){
const vol=data.map((d,i)=>i>5?Math.sqrt(data.slice(i-5,i).reduce((s,r)=>s+r.return*r.return,0)/5):null);
Plotly.newPlot("page4",[{
x:data.map(d=>d.date),y:vol,mode:"lines"}],{title:"Rolling Volatility"});
}

function indicators(){
const ma=data.map((d,i)=>i>10?data.slice(i-10,i).reduce((s,r)=>s+r.close,0)/10:null);
Plotly.newPlot("page5",[
{x:data.map(d=>d.date),y:data.map(d=>d.close),name:"Price"},
{x:data.map(d=>d.date),y:ma,name:"MA(10)"}],
{title:"Indicators"});
}

function corr(){
Plotly.newPlot("page6",[{
z:[[1,0.5],[0.5,1]],type:"heatmap"}],
{title:"Market Structure"});
}

function explain(){
Plotly.newPlot("page7",[{
x:["Return","Volatility","Momentum"],y:[0.5,0.3,0.2],type:"bar"}],
{title:"Feature Importance"});
}

function backtest(){
let eq=10000;const curve=data.map(d=>eq*=1+d.return);
Plotly.newPlot("page8",[{
x:data.map(d=>d.date),y:curve}],
{title:"Strategy Backtest"});
}

function controls(){
page9.innerHTML="<h3>Interactive Controls Ready</h3>";
}

function showPage(i){
document.querySelectorAll(".page").forEach((p,j)=>p.classList.toggle("active",j===i));
document.querySelectorAll(".tabs button").forEach((b,j)=>b.classList.toggle("active",j===i));
}

function avgRet(){return data.reduce((s,d)=>s+d.return,0)/data.length;}
function std(a){const m=a.reduce((s,v)=>s+v,0)/a.length;return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length);}
function linReg(y){const x=[...Array(y.length).keys()];const mx=x.reduce((a,b)=>a+b)/x.length;const my=y.reduce((a,b)=>a+b)/y.length;
let n=0,d=0;for(let i=0;i<x.length;i++){n+=(x[i]-mx)*(y[i]-my);d+=(x[i]-mx)**2;}
return {slope:n/d,intercept:my-(n/d)*mx};}
function future(last,n){let d=new Date(last);return Array.from({length:n},()=>new Date(d.setDate(d.getDate()+1)));}

async function lstmModel(series,h){
const seq=10,xs=[],ys=[];
for(let i=0;i<series.length-seq;i++){xs.push(series.slice(i,i+seq));ys.push(series[i+seq]);}
const X=tf.tensor(xs).reshape([xs.length,seq,1]);
const Y=tf.tensor(ys);
const m=tf.sequential();
m.add(tf.layers.lstm({units:50,inputShape:[seq,1]}));
m.add(tf.layers.dense({units:1}));
m.compile({loss:"meanSquaredError",optimizer:"adam"});
await m.fit(X,Y,{epochs:30,verbose:0});
let input=series.slice(-seq),out=[];
for(let i=0;i<h;i++){const p=m.predict(tf.tensor(input).reshape([1,seq,1])).dataSync()[0];out.push(p);input=input.slice(1).concat(p);}
return out;
}
